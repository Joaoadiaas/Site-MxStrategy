<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Página não encontrada — MX Strategy Education" />
  <meta name="robots" content="noindex, follow" />
  <title>404 — Página não encontrada | MX Strategy Education</title>

  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/css/styles.css" />

  <style>
    .error-page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 40px 20px;
      background:
        radial-gradient(ellipse at 80% 90%, rgba(226,27,60,0.18), transparent 55%),
        linear-gradient(160deg, var(--blue-950) 0%, var(--blue-900) 55%, var(--blue-800) 100%);
      color: var(--white);
    }
    .error-content { max-width: 560px; }
    .error-code {
      font-size: clamp(6rem, 18vw, 11rem);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.05em;
      background: linear-gradient(180deg, var(--white) 0%, rgba(255,255,255,0.3) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin: 0;
    }
    .error-code .accent { color: var(--red); -webkit-text-fill-color: var(--red); }
    .error-title {
      font-size: clamp(1.5rem, 3vw, 2rem);
      font-weight: 800;
      margin: 8px 0 18px;
      letter-spacing: -0.01em;
    }
    .error-text {
      color: rgba(255,255,255,0.8);
      font-size: 1.05rem;
      margin: 0 0 32px;
      line-height: 1.6;
    }
    .error-cta {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .error-logo img {
      height: 40px;
      width: auto;
      margin-bottom: 40px;
      opacity: 0.9;
    }
  </style>
</head>
<body>

  <main class="error-page">
    <div class="error-content">
      <div class="error-logo">
        <img src="/assets/mx-logo-branca.png" alt="MX Strategy Education">
      </div>

      <h1 class="error-code">4<span class="accent">0</span>4</h1>
      <h2 class="error-title">Página não encontrada</h2>
      <p class="error-text">
        Parece que essa página não existe ou foi movida.
        Vamos te ajudar a voltar pro caminho certo.
      </p>

      <div class="error-cta">
        <a href="/" class="btn btn-primary">Voltar ao Início</a>
        <a href="mailto:comercial@mxavier.com.br" class="btn btn-ghost">Fale Conosco</a>
      </div>
    </div>
  </main>

</body>
</html>
